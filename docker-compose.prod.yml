version: '3.9'

# ============================================================
# Aus Auto Parts — PRODUCTION Compose
# ============================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   - Copy backend/.env.example → backend/.env.prod and fill all values
#   - Copy frontend/.env.example → frontend/.env.prod and fill all values
#   - Ensure strong POSTGRES_PASSWORD, JWT_SECRET, etc.
#
# Key differences from docker-compose.yml (dev):
#   - NODE_ENV=production everywhere
#   - No source volume mounts (images are immutable builds)
#   - Postgres + Redis ports NOT exposed to host (internal only)
#   - Resource limits on all services
#   - CORS/rate-limiting enforced via backend env
#   - Frontend built with production VITE_API_BASE_URL
# ============================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    image: aus-auto-parts-backend:prod
    container_name: aus-auto-parts-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    # No ports: block — backend is NOT exposed directly to host in production.
    # All traffic goes through frontend nginx proxy (/api/ → backend:3000).
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        # In production the frontend proxies /api/ to the backend container.
        # Set this to the public-facing URL only if you need SSR or absolute URLs.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_NODE_ENV: production
    image: aus-auto-parts-frontend:prod
    container_name: aus-auto-parts-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: aus-auto-parts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    # No ports: — Postgres is INTERNAL only in production.
    # Backend accesses it via the internal Docker network.
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: aus-auto-parts-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 100
      --loglevel warning
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_prod:/data
    # No ports: — Redis is INTERNAL only in production.
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  internal:
    driver: bridge

volumes:
  postgres_data_prod:
    name: aus-auto-parts-postgres-prod
  redis_data_prod:
    name: aus-auto-parts-redis-prod
